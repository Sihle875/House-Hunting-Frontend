name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - Development
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - Development

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
       
    steps:
      - uses: actions/checkout@v3

      # Use proper node version before building Angular
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Install dependecies
      - name: Install dependencies
        run: npm ci

      # Build Angular app
      - name: Build Angular
        run: npm run build -- --configuration production

      # Deploy to Azure Static Web Apps 
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_PLANT_0F38CA71E }}
          action: "upload"
          
          app_location: "dist/househunting-frontend/browser"
          skip_app_build: true
          build_timeout_in_minutes: 60
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"


